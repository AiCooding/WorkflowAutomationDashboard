<mat-sidenav-container class="app-shell">
  <mat-sidenav mode="side" opened class="app-sidenav">
    <div class="app-brand">
      <mat-icon>dashboard_customize</mat-icon>
      <span>Workflow</span>
    </div>

    <mat-nav-list>
      @for (item of navItems; track item.route) {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: !!item.exact }"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
          @if (item.route === '/pipelines' && pendingApprovals() > 0) {
            <span matListItemMeta class="badge">{{ pendingApprovals() }}</span>
          }
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="app-toolbar">
      <span>{{ title }}</span>
      <span class="spacer"></span>

      <button
        mat-icon-button
        [matTooltip]="(connected$ | async) ? 'Live updates connected' : 'Live updates disconnected'"
        aria-label="Connection status"
      >
        <mat-icon [class.connected]="connected$ | async" [class.disconnected]="!(connected$ | async)">
          {{ (connected$ | async) ? 'wifi' : 'wifi_off' }}
        </mat-icon>
      </button>

      <a
        mat-icon-button
        routerLink="/pipelines"
        matTooltip="Pending approvals"
        [matBadge]="pendingApprovals()"
        [matBadgeHidden]="pendingApprovals() === 0"
        matBadgeColor="warn"
        matBadgeSize="small"
        aria-label="Pending approvals"
      >
        <mat-icon>notifications</mat-icon>
      </a>

      <a
        mat-icon-button
        [href]="helpUrl"
        target="_blank"
        rel="noopener noreferrer"
        matTooltip="Help & documentation"
        aria-label="Help"
      >
        <mat-icon>help_outline</mat-icon>
      </a>
    </mat-toolbar>

    <main class="app-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
