services:
  dashboard:
    build: .
    ports:
      - "${DASHBOARD_PORT:-5080}:5080"
    volumes:
      - dashboard-data:/data
      - ./docs:/app/docs
      # Optional: mount ~/.copilot to enable Catalog browsing inside Docker.
      # Agent execution (spawning copilot) is still disabled; this only enables
      # the read-only Catalog and workflow/agent definition browser.
      # - ${HOME}/.copilot:/root/.copilot:ro
    environment:
      - ConnectionStrings__WorkflowDb=Data Source=/data/workflow.db
      # Phase 4: Docker cannot see the host's ~/.copilot/ or spawn host `copilot`.
      # Run on the host (dotnet run) to use the AgentRunner.
      - AgentRunner__Enabled=false
      # Uncomment to override catalog dirs when using the bind mount above:
      # - Catalog__WorkflowsDir=/root/.copilot/workflows
      # - Catalog__AgentsDir=/root/.copilot/agents
    restart: unless-stopped

volumes:
  dashboard-data:
